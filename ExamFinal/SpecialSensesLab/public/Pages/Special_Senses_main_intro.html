<style id="responsive-fit-style">
  html {
    min-height: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  body {
    min-height: 100%;
    margin: 0;
    padding-left: clamp(24px, 6vw, 64px);
    padding-right: clamp(24px, 6vw, 64px);
  }
  *, *::before, *::after { box-sizing: inherit; }
  img, video, iframe, object, embed {
    display: block;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  iframe {
    width: min(100%, 960px);
    aspect-ratio: 608 / 402;
  }
</style>
</head>
