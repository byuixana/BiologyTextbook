<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		body {
			padding: 45px;
			font-size: 14pt;
			font-family: Helvetica, Geneva, Verdana, Arial;
			color: white;
			background-color: black;

			font-weight: bold;

		p {
			font-style: italic;

<style id="responsive-fit-style">
  html {
    min-height: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  body {
    min-height: 100%;
    margin: 0;
    padding: 0;
  }
  *, *::before, *::after { box-sizing: inherit; }
  img, video, iframe, object, embed {
    display: block;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  iframe {
    width: min(100%, 960px);
    aspect-ratio: 608 / 402;
  }
</style>
</head>
<body>
	<h1><center><u>Sutures</u></h1>
	<p><center>Sutures are rigid joints which connect the bones of the skull together. The fibrous connective tissue that makes up the suture is covered by periosteum that extends from the bones themselves. Some examples of sutures include the Coronal, Squamous, and Lambdoid sutures. </center><p>
	<p></p>

</body>
