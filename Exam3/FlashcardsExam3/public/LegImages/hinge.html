<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		body {
			padding: 45px;
			font-size: 14pt;
			font-family: Helvetica, Geneva, Verdana, Arial;
			color: white;
			background-color: black;

		h1 {
			font-weight: bold;
			color: white;

		p {
			font-style: italic;
		}
	</style>
<style id="responsive-fit-style">
  html {
    min-height: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  body {
    min-height: 100%;
    margin: 0;
    padding: 0;
  }
  *, *::before, *::after { box-sizing: inherit; }
  img, video, iframe, object, embed {
    display: block;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  iframe {
    width: min(100%, 960px);
    aspect-ratio: 608 / 402;
  }
</style>
</head>
<body>
	<h1><center><u>Hinge Joints</u></h1>
	<p><center>A hinge joint is a type of joint in which the convex surface of one bone articulates with the concave surface of another bone to from a hinge. Hinge joints are classified as uniaxial joints. Some examples of hinge joints include the joints of the knees and elbows.</center><p>
