<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		html {
			height: 98%;
		}

		body {
			height: 100%;
			padding: 45px;
			font-size: 14pt;
			font-family: Helvetica, Geneva, Verdana, Arial;
			color: white;
			background-color: #2d2d2d;
		}

		h1 {
			font-weight: bold;
			color: #fff;
			text-align: center;
			text-decoration: underline;
		}

		p {
			color: #fff;
		}

		img {
			float: right;
			margin-left: 10px;
			margin-bottom: 5px;
			border: solid white 1px;
			padding: 2px;
			width: 400px;
			max-width: 100%;
			height: auto;
		}

		a {
			color:#33F6FF;
		}
	</style>
	<style id="responsive-fit-style">
  html {
    min-height: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  body {
    min-height: 100%;
    margin: 0;
    padding-left: clamp(24px, 6vw, 64px);
    padding-right: clamp(24px, 6vw, 64px);
  }
  *, *::before, *::after { box-sizing: inherit; }
  img, video, iframe, object, embed {
    display: block;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  iframe {
    width: min(100%, 960px);
    aspect-ratio: 608 / 402;
  }
</style>
</head>
<body>
		<h1>Leg Muscles</h1>

		<p>This week you will begin study the muscles of the lower extremity or the leg. As before, it will be important to periodically return to the muscles you learn early on as you can quickly forget them as the new weeks start. Please begin by clicking on the WEEK 10.1.1.</p>
</body>
