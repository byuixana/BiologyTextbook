<!-- responsive-fit patch -->
<meta name="viewport" content="width=device-width, initial-scale=1" />
	<style>
		body {
			padding: 45px;
			font-size: 14pt;
			font-family: Helvetica, Geneva, Verdana, Arial;
			color: white;
			background-color: black;
		}
		h1 {
			font-weight: bold;
			color: white;
		}


	</style>
<style id="responsive-fit-style">
  html {
    min-height: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  body {
    min-height: 100%;
    margin: 0;
    padding-left: clamp(24px, 6vw, 64px);
    padding-right: clamp(24px, 6vw, 64px);
  }
  *, *::before, *::after { box-sizing: inherit; }
  img, video, iframe, object, embed {
    display: block;
    max-width: 100%;
    height: auto;
    margin-left: auto;
    margin-right: auto;
  }
  iframe {
    width: min(100%, 960px);
    aspect-ratio: 608 / 402;
  }
</style>
</head>
<body>
	<h1><center><u>Saddle Joint</u></h1>
	<p>A saddle joint is made up of two bones that have saddle shaped ends. These ends are aligned perpendicular to one another so that they come together to form an X. Saddle joints are classified as biaxial joints. A good example of a saddle joint is the carpometacarpal joint in the thumb.<p>
	<p></p>

</body>
